<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Learn New Skill</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .skill-card {
            border: 0;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
            height: 100%;
        }
    </style>
</head>
<body class="bg-light">
<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
        <div>
            <h1 class="mb-1">Learn New Skill</h1>
            <p class="text-muted mb-0">Add a skill to your account and start tracking progress.</p>
        </div>
        <a th:href="@{/dashboard}" class="btn btn-outline-secondary">← Back to Dashboard</a>
    </div>

    <div class="row g-4">
        <div class="col-md-6 col-xl-4" th:each="skill : ${skills}">
            <div class="card skill-card">
                <div class="card-body d-flex flex-column">
                    <h5 class="mb-2" th:text="${skill.skillName}">Skill Name</h5>
                    <p class="text-muted flex-grow-1" th:text="${skill.description}">Description</p>

                    <div th:if="${skill.alreadyAdded}">
                        <button class="btn btn-success w-100" disabled>Already Added</button>
                    </div>

                    <form th:if="${!skill.alreadyAdded}"
                          th:action="@{/learn/add}"
                          method="post"
                          class="mt-3">
                        <input type="hidden" name="skillId" th:value="${skill.skillId}">
                        <input type="hidden" name="userId" th:value="${userId}">
                        <button type="submit" class="btn btn-primary w-100">Add Skill</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
