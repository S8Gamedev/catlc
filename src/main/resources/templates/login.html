<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/default :: page('Login', ~{::body})}">
<body>
<div class="container d-flex align-items-center justify-content-center min-vh-100 py-5">
    <div class="row w-100 justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card shadow-lg border-0">
                <div class="card-body p-5">
                    <div class="text-center mb-5">
                        <i class="fas fa-brain fa-4x text-primary mb-3"></i>
                        <h2 class="fw-bold text-primary">Welcome Back</h2>
                        <p class="text-muted">Sign in to your learning dashboard</p>
                    </div>

                    <div th:if="${param.error}" class="alert alert-danger">
                        Invalid email or password
                    </div>
                    <div th:if="${param.logout}" class="alert alert-success">
                        You have been logged out
                    </div>
                    <div th:if="${param.success}" class="alert alert-success">
                        Account created! Please login.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-4">
                            <label class="form-label">Email or username</label>
                            <input type="text"
                                   name="username"
                                   class="form-control"
                                   placeholder="Email or username"
                                   autocomplete="username"
                                   required>

                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Password</label>
                            <input type="password" name="password" class="form-control form-control-lg"
                                   placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-3 fw-bold">
                            <i class="fas fa-sign-in-alt me-2"></i>Sign In
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <p>Demo Account: <code>john@example.com</code> / <code>password</code></p>
                        <p class="text-muted">Don't have an account? <a href="/register" class="text-primary fw-bold">Sign up</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
