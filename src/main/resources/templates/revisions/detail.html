<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Revision Task</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="mb-4">
        <a href="/revisions" class="btn btn-outline-secondary btn-sm">← Back</a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <div class="d-flex justify-content-between align-items-start mb-3">
                <div>
                    <h2 class="mb-1">
                        <a th:href="@{'/skills/' + ${skillId} + '?userId='+${userId}}"
                           th:text="${skillName}"
                           class="text-decoration-none text-dark">
                            Java Basics
                        </a>
                    </h2>
                    <p class="text-muted mb-0">
                        Task type:
                        <span class="badge bg-primary" th:text="${taskType}">CODE</span>
                    </p>
                </div>
                <div class="text-end">
                    <small class="text-muted">Due at</small>
                    <div th:text="${#temporals.format(dueAt, 'dd MMM yyyy HH:mm')}">30 Mar 2026 10:00</div>
                </div>
            </div>

            <hr>

            <p class="mb-4">
                Complete this revision task, then record how well you recalled the material so the next review can be scheduled correctly.
            </p>

            <div class="mb-4">
                <a th:href="${actionUrl}" class="btn btn-primary btn-lg">
                    Open Task
                </a>
            </div>

            <div>
                <h5 class="mb-3">How well did you recall it?</h5>
                <div class="d-flex gap-2 flex-wrap">
                    <button class="btn btn-success" th:attr="onclick='completeTask(' + ${task.taskId} + ',1.0)'">Easy</button>
                    <button class="btn btn-warning" th:attr="onclick='completeTask(' + ${task.taskId} + ',0.7)'">Medium</button>
                    <button class="btn btn-danger" th:attr="onclick='completeTask(' + ${task.taskId} + ',0.4)'">Hard</button>
                </div>
            </div>

            <div id="resultMsg" class="mt-3 fw-semibold"></div>
        </div>
    </div>
</div>

<script>
    async function completeTask(taskId, recallScore) {
        const res = await fetch('/api/revision/tasks/' + taskId + '/complete', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ recallScore: recallScore })
        });

        const msg = document.getElementById('resultMsg');

        if (res.ok) {
            msg.className = 'mt-3 text-success fw-semibold';
            msg.textContent = 'Task completed successfully.';
        } else {
            msg.className = 'mt-3 text-danger fw-semibold';
            msg.textContent = 'Failed to complete task.';
        }
    }
</script>
</body>
</html>
