<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skills</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f7f8fb; }
        .card-soft { border: 0; border-radius: 16px; box-shadow: 0 8px 28px rgba(20,20,40,0.08); }
        .muted { color: #6b7280; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/dashboard">catlc</a>
        <div class="ms-auto d-flex gap-2 align-items-center">
            <span class="small muted">Logged in:</span>
            <span class="small fw-semibold" th:text="${userEmail}">user@email</span>
            <a class="btn btn-outline-secondary btn-sm" href="/dashboard">Dashboard</a>
            <a class="btn btn-outline-danger btn-sm" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<div class="container py-4">
    <div class="card card-soft p-3">
        <div class="d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Skill tracking</h5>
            <span class="muted small" th:text="'Total: ' + ${#lists.size(states)}">Total: 0</span>
        </div>
        <hr/>

        <div class="table-responsive">
            <table class="table align-middle">
                <thead>
                <tr class="muted">
                    <th>Skill</th>
                    <th style="width: 40%">Mastery</th>
                    <th>Confidence</th>
                    <th>Practice count</th>
                    <th>Last practiced</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="ks : ${states}">
                    <td class="fw-semibold" th:text="${ks.skill.name}">Skill</td>
                    <td>
                        <div class="progress" style="height: 10px;">
                            <div class="progress-bar bg-success"
                                 th:style="'width:' + ${ks.masteryScore} + '%'"
                                 th:text="${ks.masteryScore} + '%'">0%</div>
                        </div>
                    </td>
                    <td th:text="${ks.confidenceLevel}">MEDIUM</td>
                    <td th:text="${ks.practiceCount}">0</td>
                    <td th:text="${ks.lastPracticed}">-</td>
                </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
