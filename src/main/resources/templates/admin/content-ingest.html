<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Content Ingestion Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <h2 class="mb-4">Content Ingestion Admin</h2>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <div class="card mb-4">
        <div class="card-body">
            <h5>Ingest Existing Skill</h5>
            <form method="post" th:action="@{/admin/content/ingest-by-skill-id}">
                <div class="mb-3">
                    <label class="form-label">Skill ID</label>
                    <input type="number" class="form-control" name="skillId" required>
                </div>
                <button class="btn btn-primary" type="submit">Ingest Existing Skill</button>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <h5>Create Skill If Missing + Ingest</h5>
            <form method="post" th:action="@{/admin/content/ingest-by-skill-name}">
                <div class="mb-3">
                    <label class="form-label">Skill Name</label>
                    <input type="text" class="form-control" name="skillName" required>
                </div>
                <button class="btn btn-dark" type="submit">Create / Ingest Skill</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
