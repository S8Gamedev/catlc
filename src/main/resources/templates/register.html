<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/default :: page('Register', ~{::body})}">
<body>
<div class="container d-flex align-items-center justify-content-center min-vh-100 py-5">
    <div class="row w-100 justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0">
                <div class="card-body p-5">
                    <div class="text-center mb-5">
                        <i class="fas fa-user-plus fa-4x text-success mb-3"></i>
                        <h2 class="fw-bold text-primary">Create Account</h2>
                        <p class="text-muted">Join thousands of learners</p>
                    </div>

                    <form th:action="@{/register}" th:object="${form}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <div class="mb-4">
                            <label class="form-label fw-bold">Username</label>
                            <input type="text" th:field="*{username}" class="form-control form-control-lg" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Email</label>
                            <input type="email" th:field="*{email}" class="form-control form-control-lg" required>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Password</label>
                                <input type="password" th:field="*{password}" class="form-control form-control-lg" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Confirm Password</label>
                                <input type="password" th:field="*{confirmPassword}" class="form-control form-control-lg" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-success btn-lg w-100">Create Account</button>
                    </form>


                    <div class="text-center mt-4 pt-3 border-top">
                        <p class="text-muted mb-0">Already have an account?
                            <a href="/login" class="text-primary fw-bold">Sign in</a>
                        </p>
                        <p class="mt-2">
                            <a href="/dashboard?userId=1" class="btn btn-outline-primary btn-sm">
                                <i class="fas fa-rocket me-1"></i>Demo Dashboard
                            </a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Password match validation
    document.querySelector('form').addEventListener('submit', function(e) {
        const pass1 = document.querySelector('input[name="password"]').value;
                    const pass2 = document.querySelector('input[name="confirmPassword"]').value;
            if (pass1 !== pass2) {
                e.preventDefault();
                alert('Passwords do not match!');
                return false;
            }
        });

        // Real-time password match indicator
        document.querySelector('input[name="confirmPassword"]').addEventListener('input', function() {
            const pass1 = document.querySelector('input[name="password"]').value;
            const pass2 = this.value;
            const label = this.parentElement.querySelector('label');

            if (pass1 === pass2 && pass2.length > 0) {
                label.classList.add('text-success');
                label.innerHTML += ' <i class="fas fa-check-circle ms-1"></i>';
            } else {
                label.classList.remove('text-success');
                label.innerHTML = label.innerHTML.replace(/<i.*<\/i>$/, '');
            }
        });
</script>
</body>
</html>
