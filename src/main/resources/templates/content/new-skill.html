<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Skill</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .panel {
            border: 0;
            border-radius: 18px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
        }
    </style>
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="mb-4">
        <a th:href="@{/content(userId=${form.userId})}" class="btn btn-outline-secondary btn-sm">Back to Content</a>
    </div>

    <div class="card panel">
        <div class="card-body p-4">
            <h2 class="mb-1">Create New Skill</h2>
            <p class="text-muted mb-4">
                If your skill does not exist yet, create it here and then add learning notes.
            </p>

            <form th:action="@{/content/save-skill}" th:object="${form}" method="post">
                <input type="hidden" th:field="*{userId}">

                <div class="mb-3">
                    <label class="form-label">Skill Name</label>
                    <input type="text" th:field="*{name}" class="form-control" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Description</label>
                    <textarea th:field="*{description}" class="form-control" rows="4"></textarea>
                </div>

                <button type="submit" class="btn btn-primary">Create Skill</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
